name: Build SabreALPR EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Dependencies
      run: dotnet restore SabreALPR/SabreALPR.csproj

    - name: Publish Windows EXE
      run: |
        dotnet publish SabreALPR/SabreALPR.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          /p:PublishSingleFile=true `
          /p:PublishReadyToRun=true `
          /p:IncludeNativeLibrariesForSelfExtract=true

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SabreALPR-Windows-Binary
        path: SabreALPR/bin/Release/net8.0-windows/win-x64/publish/