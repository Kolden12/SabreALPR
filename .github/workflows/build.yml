name: Build SabreALPR EXE and Installer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # or whatever version is best

    - name: Install Dependencies
      run: |
        cd SabrePatrolLPR
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        cd SabrePatrolLPR
        pyinstaller SabrePatrolLPR.spec

    - name: Compile Inno Setup Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: SabrePatrolLPR/installer.iss
        options: /O+

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SabreALPR-Tactical-Installer
        path: SabrePatrolLPR/Output/SabrePatrolLPR_Setup.exe