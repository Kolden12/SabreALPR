name: Build SabreALPR EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish EXE
     run: dotnet publish SabreALPR/SabreALPR.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true /p:IncludeNativeLibrariesForSelfExtract=truedyToRun=true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SabreALPR-Windows-Binary
        path: SabreALPR/bin/Release/net8.0/win-x64/publish/*.exe